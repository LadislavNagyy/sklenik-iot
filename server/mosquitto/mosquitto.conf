# Mosquitto broker — dokumentacia konfiguracie
# Kriteria: 4.3 allow_anonymous false, 4.4 konfiguracny subor v repozitari
#
# Poznamka: Server bezi ako Home Assistant OS add-on (Mosquitto broker add-on).
# Tato konfiguracia dokumentuje nastavenia zodpovedajuce realnej konfiguraci add-onu.
# Realna konfiguracia sa nastavuje cez HA UI: Settings -> Add-ons -> Mosquitto broker -> Configuration
#
# Ekvivalentna konfiguracia add-onu (YAML v UI):
#   logins:
#     - username: mqtt_iot
#       password: <heslo>
#   customize:
#     active: false

listener 1883

# Zakaz anonymneho pristupu — nastavene automaticky ked su definovane logins v add-on konfiguraci
allow_anonymous false

# Logins su konfigrovane cez HA add-on UI (nie subor, nie je v git)

# ACL opravnenia
acl_file /etc/mosquitto/acl

log_type error
log_type warning
log_type notice
